<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GameVault | Premium Game Tracker with Auto-Fill</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --card-bg: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border: #e2e8f0;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --sidebar-bg: #1e1b2e;
            --shadow: 0 20px 35px -10px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark-mode {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: #334155;
            --sidebar-bg: #0f0f1a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .app-container { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            border-right: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            font-family: 'Outfit', sans-serif;
        }

        .logo-area i {
            font-size: 2rem;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-menu { display: flex; flex-direction: column; gap: 0.75rem; }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            border-radius: 14px;
            color: #cbd5e1;
            transition: var(--transition);
            font-weight: 500;
            text-decoration: none;
        }

        .nav-link i { width: 24px; }
        .nav-link:hover { background: rgba(139, 92, 246, 0.2); color: white; transform: translateX(5px); }
        .nav-link.active {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.2));
            color: white;
            border-left: 3px solid var(--accent);
        }

        .dark-mode-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            color: white;
            padding: 1rem;
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            border-radius: 34px;
            transition: 0.3s;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        input:checked + .slider { background: linear-gradient(135deg, var(--accent), var(--accent-hover)); }
        input:checked + .slider:before { transform: translateX(26px); }

        .main-content { flex: 1; padding: 2rem; overflow-y: auto; }
        
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .content-header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4); }
        .btn-primary.full { width: 100%; justify-content: center; }
        .btn-secondary {
            background: var(--border);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: var(--text-primary);
            cursor: pointer;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 28px;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card i { font-size: 2.5rem; background: linear-gradient(135deg, var(--accent), #ec4899); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .stat-card h3 { font-size: 0.85rem; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { font-size: 2rem; font-weight: 700; margin-top: 5px; }

        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .chart-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .chart-card h4 { text-align: center; margin-top: 1rem; color: var(--text-secondary); }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 2rem;
            background: var(--card-bg);
            padding: 1rem 1.5rem;
            border-radius: 60px;
            border: 1px solid var(--border);
        }
        
        .search-box {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-primary);
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid var(--border);
        }
        .search-box input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
        }
        
        select {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            padding: 8px 20px;
            border-radius: 40px;
            color: var(--text-primary);
            cursor: pointer;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.8rem;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            transition: var(--transition);
            border: 1px solid var(--border);
            cursor: pointer;
        }
        .game-card:hover { transform: translateY(-8px); box-shadow: 0 25px 40px -12px rgba(0,0,0,0.3); border-color: var(--accent); }
        
        .game-cover {
            position: relative;
            height: 180px;
            overflow: hidden;
            background: linear-gradient(135deg, #1e1b2e, #2d2a4a);
        }
        .game-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .game-card:hover .game-cover img { transform: scale(1.05); }
        
        .progress-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: rgba(0,0,0,0.5);
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399);
            transition: width 0.3s;
        }
        
        .card-content { padding: 1.2rem; }
        
        .game-title {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .game-title small { font-size: 0.7rem; color: var(--text-secondary); font-weight: 400; }
        
        .rating-stars {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
        }
        .rating-stars i { color: #fbbf24; font-size: 0.85rem; }
        
        .game-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 10px 0;
        }
        .tag {
            background: var(--bg-primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--accent);
        }
        
        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .card-actions button {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            transition: var(--transition);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .card-actions button:hover { color: var(--accent); background: rgba(139, 92, 246, 0.1); }

        /* Search Game Modal */
        .search-game-section {
            margin-bottom: 1rem;
        }
        
        .game-search-input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 50px;
            border: 2px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 1rem;
        }
        
        .search-results {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 1rem;
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        
        .search-result-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 1px solid var(--border);
        }
        
        .search-result-item:hover {
            background: var(--accent);
            color: white;
        }
        
        .search-result-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 12px;
        }
        
        .search-result-info h4 {
            font-size: 1rem;
            margin-bottom: 4px;
        }
        
        .search-result-info p {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .search-result-item:hover .search-result-info p {
            color: rgba(255,255,255,0.8);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--bg-secondary);
            border-radius: 32px;
            max-width: 600px;
            width: 90%;
            padding: 2rem;
            border: 1px solid var(--border);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .close-modal {
            font-size: 2rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .close-modal:hover { color: var(--danger); transform: rotate(90deg); }

        .form-group { margin-bottom: 1rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        label { font-weight: 500; display: block; margin-bottom: 6px; font-size: 0.85rem; }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
        }
        input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1); }

        .cover-preview {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 1rem;
        }

        .loading-covers {
            text-align: center;
            padding: 3rem;
            font-size: 1.1rem;
            color: var(--accent);
        }
        .empty-state {
            text-align: center;
            padding: 4rem;
            background: var(--card-bg);
            border-radius: 28px;
            color: var(--text-secondary);
        }

        .notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 28px;
            border-radius: 50px;
            color: white;
            font-weight: 500;
            z-index: 10000;
            animation: slideIn 0.3s ease;
            display: none;
        }
        .notification.success { background: linear-gradient(135deg, #10b981, #059669); }
        .notification.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .sidebar { width: 80px; padding: 1.5rem 0.5rem; }
            .logo-area span, .nav-link span { display: none; }
            .main-content { padding: 1rem; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 1rem; }
            .form-row { grid-template-columns: 1fr; }
            .filter-bar { border-radius: 20px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <div class="logo-area"><i class="fas fa-dice-d6"></i><span>GameVault</span></div>
        <nav class="nav-menu">
            <a href="#" class="nav-link active" data-tab="dashboard"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
            <a href="#" class="nav-link" data-tab="library"><i class="fas fa-gamepad"></i><span>My Library</span></a>
        </nav>
        <div class="dark-mode-toggle">
            <i class="fas fa-moon"></i>
            <label class="switch"><input type="checkbox" id="darkModeToggle"><span class="slider round"></span></label>
            <i class="fas fa-sun"></i>
        </div>
    </aside>
    <main class="main-content">
        <header class="content-header">
            <h1 id="pageTitle">Dashboard</h1>
            <button id="addGameBtn" class="btn-primary"><i class="fas fa-plus"></i> Add Game</button>
        </header>
        
        <section id="dashboardSection" class="section active">
            <div class="stats-grid">
                <div class="stat-card"><i class="fas fa-gamepad"></i><div><h3>Total Games</h3><p id="totalGames">0</p></div></div>
                <div class="stat-card"><i class="fas fa-trophy"></i><div><h3>Completed</h3><p id="completedGames">0</p></div></div>
                <div class="stat-card"><i class="fas fa-clock"></i><div><h3>Total Hours</h3><p id="totalHours">0</p></div></div>
                <div class="stat-card"><i class="fas fa-star"></i><div><h3>Avg Rating</h3><p id="avgRating">0.0</p></div></div>
            </div>
            <div class="charts-row">
                <div class="chart-card"><canvas id="genreChart"></canvas><h4>Top Genres</h4></div>
                <div class="chart-card"><canvas id="completionChart"></canvas><h4>Completion Status</h4></div>
                <div class="chart-card"><canvas id="ratingChart"></canvas><h4>Rating Distribution</h4></div>
            </div>
        </section>
        
        <section id="librarySection" class="section">
            <div class="filter-bar">
                <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search your library..."></div>
                <select id="filterGenre"><option value="">All Genres</option></select>
                <select id="filterPlatform"><option value="">All Platforms</option></select>
                <select id="filterRating"><option value="">All Ratings</option><option value="5">5★</option><option value="4">4★+</option><option value="3">3★+</option></select>
                <select id="filterStatus"><option value="">All Status</option><option value="completed">Completed</option><option value="playing">Playing</option><option value="backlog">Backlog</option></select>
            </div>
            <div id="gamesGrid" class="games-grid"></div>
        </section>
    </main>
</div>

<!-- MODAL ADD/EDIT GAME WITH SEARCH -->
<div id="gameModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Add New Game</h3>
            <span class="close-modal">&times;</span>
        </div>
        
        <!-- Search Game from API -->
        <div class="search-game-section">
            <label>🔍 Search Game (Auto-fill from RAWG)</label>
            <input type="text" id="gameSearchInput" class="game-search-input" placeholder="Type game name... e.g., The Witcher, Elden Ring">
            <div id="searchResults" class="search-results" style="display:none;"></div>
        </div>
        
        <div style="text-align: center; margin: 10px 0;">— OR —</div>
        
        <form id="gameForm">
            <input type="hidden" id="gameId">
            <div class="form-group">
                <label>Game Title *</label>
                <input type="text" id="title" required placeholder="e.g., The Witcher 3">
            </div>
            
            <!-- Cover Preview -->
            <div id="coverPreviewContainer" style="display:none;">
                <label>Cover Art</label>
                <img id="coverPreview" class="cover-preview" src="" alt="Game cover">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Platform</label>
                    <input type="text" id="platform" placeholder="PC, PS5, Switch">
                </div>
                <div class="form-group">
                    <label>Genre</label>
                    <input type="text" id="genre" placeholder="RPG, Action">
                </div>
            </div>
            <div class="form-group">
                <label>Tags (comma)</label>
                <input type="text" id="tags" placeholder="open-world, story-rich">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Progress (%)</label>
                    <input type="number" id="progress" min="0" max="100" value="0">
                </div>
                <div class="form-group">
                    <label>Rating (1-5)</label>
                    <input type="number" id="rating" step="0.5" min="1" max="5" value="3">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Hours Played</label>
                    <input type="number" id="hours_played" step="0.5" value="0">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="status">
                        <option value="backlog">📚 Backlog</option>
                        <option value="playing">🎮 Playing</option>
                        <option value="completed">🏆 Completed</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn-primary full">💾 Save Game</button>
        </form>
    </div>
</div>

<!-- DELETE MODAL -->
<div id="deleteModal" class="modal">
    <div class="modal-content" style="max-width:400px">
        <h3>🗑️ Confirm Delete</h3>
        <p>Are you sure you want to delete this game?</p>
        <div style="display:flex; gap:1rem; margin-top:1.5rem">
            <button id="confirmDeleteBtn" class="btn-primary" style="background:#ef4444">Delete</button>
            <button id="cancelDeleteBtn" class="btn-secondary">Cancel</button>
        </div>
    </div>
</div>
