<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GameVault | Premium Game Tracker</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --card-bg: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border: #e2e8f0;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --success: #10b981;
            --danger: #ef4444;
            --sidebar-bg: #1e1b2e;
            --shadow: 0 20px 35px -10px rgba(0,0,0,0.08);
        }

        .dark-mode {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: #334155;
            --sidebar-bg: #0f0f1a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        /* Layout Utama */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Desktop */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            border-right: 1px solid rgba(255,255,255,0.1);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 10;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
        }

        .logo-area i {
            font-size: 2rem;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            border-radius: 14px;
            color: #cbd5e1;
            transition: all 0.3s;
            text-decoration: none;
            cursor: pointer;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(139, 92, 246, 0.2);
            color: white;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 2rem;
            min-height: 100vh;
        }

        /* Bottom Navigation (Mobile) */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 10px 20px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            z-index: 100;
            justify-content: space-around;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
        }

        .nav-item i { font-size: 1.4rem; }
        .nav-item.active { color: var(--accent); background: rgba(139, 92, 246, 0.15); }
        .nav-item.fab {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            margin-top: -20px;
        }

        /* Header */
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .content-header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 28px;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .stat-card i {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--accent), #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stat-card h3 {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .stat-card p {
            font-size: 2rem;
            font-weight: 700;
        }

        /* Charts */
        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .chart-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 1.5rem;
            border: 1px solid var(--border);
        }

        .chart-card h4 {
            text-align: center;
            margin-top: 1rem;
            color: var(--text-secondary);
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 2rem;
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 60px;
            border: 1px solid var(--border);
        }

        .search-box {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-primary);
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid var(--border);
        }

        .search-box input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
        }

        select {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            padding: 8px 20px;
            border-radius: 40px;
            color: var(--text-primary);
            cursor: pointer;
        }

        /* Games Grid */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        /* Game Card */
        .game-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.2);
        }

        .game-cover {
            position: relative;
            height: 180px;
            overflow: hidden;
        }

        .game-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .progress-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: rgba(0,0,0,0.3);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #a855f7);
            transition: width 0.3s;
        }

        .card-content {
            padding: 1rem;
        }

        .game-title {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .rating-stars i {
            color: #fbbf24;
            font-size: 0.85rem;
        }

        .game-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 10px 0;
        }

        .tag {
            background: var(--bg-primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .card-actions button {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 8px;
        }

        .card-actions button:hover {
            color: var(--accent);
            background: rgba(139, 92, 246, 0.1);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 32px;
            max-width: 550px;
            width: 90%;
            padding: 2rem;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .close-modal {
            font-size: 2rem;
            cursor: pointer;
        }

        /* Forms */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        label {
            font-weight: 500;
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* Dark Mode Toggle */
        .dark-mode-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            color: white;
            padding: 1rem;
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            border-radius: 34px;
            transition: 0.3s;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
            transition: 0.3s;
        }

        input:checked + .slider {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        /* Search Results */
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 300px;
            overflow-y: auto;
            background: var(--bg-secondary);
            border-radius: 20px;
            border: 1px solid var(--border);
            z-index: 1000;
            display: none;
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
        }

        .search-result-item:hover {
            background: var(--accent);
            color: white;
        }

        .search-result-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 12px;
        }

        /* Section Toggle */
        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem;
            background: var(--card-bg);
            border-radius: 28px;
        }

        /* Notification */
        .notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            z-index: 10000;
            display: none;
        }

        .notification.success {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .notification.error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        /* Cover Preview */
        .cover-preview {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 1rem;
        }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, var(--border) 25%, var(--bg-primary) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .main-content {
                margin-left: 0;
                padding: 1rem;
                padding-bottom: 80px;
            }

            .bottom-nav {
                display: flex;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 1rem;
            }

            .stat-card p {
                font-size: 1.5rem;
            }

            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 1rem;
            }

            .game-title {
                font-size: 0.85rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .filter-bar {
                flex-direction: column;
                border-radius: 20px;
            }

            .search-box {
                width: 100%;
            }

            select {
                width: 100%;
            }
        }

        @media (min-width: 769px) {
            .mobile-only {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Desktop Sidebar -->
    <aside class="sidebar">
        <div class="logo-area">
            <i class="fas fa-dice-d6"></i>
            <span>GameVault</span>
        </div>
        <nav class="nav-menu">
            <a class="nav-link active" data-tab="dashboard">
                <i class="fas fa-chart-pie"></i>
                <span>Dashboard</span>
            </a>
            <a class="nav-link" data-tab="library">
                <i class="fas fa-gamepad"></i>
                <span>My Library</span>
            </a>
        </nav>
        <div class="dark-mode-toggle">
            <i class="fas fa-moon"></i>
            <label class="switch">
                <input type="checkbox" id="darkModeToggle">
                <span class="slider round"></span>
            </label>
            <i class="fas fa-sun"></i>
        </div>
    </aside>

    <!-- Mobile Bottom Navigation -->
    <div class="bottom-nav">
        <button class="nav-item active" data-tab="dashboard">
            <i class="fas fa-chart-pie"></i>
            <span>Stats</span>
        </button>
        <button class="nav-item fab" id="mobileAddBtn">
            <i class="fas fa-plus"></i>
            <span>Add</span>
        </button>
        <button class="nav-item" data-tab="library">
            <i class="fas fa-gamepad"></i>
            <span>Library</span>
        </button>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <header class="content-header">
            <h1 id="pageTitle">Dashboard</h1>
            <button id="addGameBtn" class="btn-primary">
                <i class="fas fa-plus"></i> Add Game
            </button>
        </header>

        <!-- Dashboard Section -->
        <section id="dashboardSection" class="section active">
            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-gamepad"></i>
                    <div>
                        <h3>Total Games</h3>
                        <p id="totalGames">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-trophy"></i>
                    <div>
                        <h3>Completed</h3>
                        <p id="completedGames">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-clock"></i>
                    <div>
                        <h3>Total Hours</h3>
                        <p id="totalHours">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-star"></i>
                    <div>
                        <h3>Avg Rating</h3>
                        <p id="avgRating">0.0</p>
                    </div>
                </div>
            </div>
            <div class="charts-row">
                <div class="chart-card">
                    <canvas id="genreChart"></canvas>
                    <h4>Top Genres</h4>
                </div>
                <div class="chart-card">
                    <canvas id="completionChart"></canvas>
                    <h4>Completion Status</h4>
                </div>
                <div class="chart-card">
                    <canvas id="ratingChart"></canvas>
                    <h4>Rating Distribution</h4>
                </div>
            </div>
        </section>

        <!-- Library Section -->
        <section id="librarySection" class="section">
            <div class="filter-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search your library...">
                </div>
                <select id="filterGenre">
                    <option value="">All Genres</option>
                </select>
                <select id="filterPlatform">
                    <option value="">All Platforms</option>
                </select>
                <select id="filterRating">
                    <option value="">All Ratings</option>
                    <option value="5">5★</option>
                    <option value="4">4★+</option>
                    <option value="3">3★+</option>
                </select>
                <select id="filterStatus">
                    <option value="">All Status</option>
                    <option value="completed">Completed</option>
                    <option value="playing">Playing</option>
                    <option value="backlog">Backlog</option>
                </select>
            </div>
            <div id="gamesGrid" class="games-grid">
                <div class="empty-state">
                    <i class="fas fa-gamepad" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                    <p>Loading games...</p>
                </div>
            </div>
        </section>
    </main>
</div>

<!-- Add/Edit Modal -->
<div id="gameModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Add New Game</h3>
            <span class="close-modal">&times;</span>
        </div>
        <div style="position: relative; margin-bottom: 1rem;">
            <input type="text" id="gameSearchInput" placeholder="🔍 Search game from RAWG..." style="width: 100%; padding: 12px; border-radius: 50px; border: 1px solid var(--border); background: var(--bg-primary);">
            <div id="searchResults" class="search-results"></div>
        </div>
        <div style="text-align: center; margin: 10px 0;">— OR —</div>
        <form id="gameForm">
            <input type="hidden" id="gameId">
            <div class="form-group">
                <label>Game Title *</label>
                <input type="text" id="title" required>
            </div>
            <div id="coverPreviewContainer" style="display: none;">
                <img id="coverPreview" class="cover-preview" src="">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Platform</label>
                    <input type="text" id="platform">
                </div>
                <div class="form-group">
                    <label>Genre</label>
                    <input type="text" id="genre">
                </div>
            </div>
            <div class="form-group">
                <label>Tags (comma)</label>
                <input type="text" id="tags">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Progress (%)</label>
                    <input type="number" id="progress" min="0" max="100" value="0">
                </div>
                <div class="form-group">
                    <label>Rating (1-5)</label>
                    <input type="number" id="rating" step="0.5" min="1" max="5" value="3">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Hours Played</label>
                    <input type="number" id="hours_played" step="0.5" value="0">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="status">
                        <option value="backlog">📚 Backlog</option>
                        <option value="playing">🎮 Playing</option>
                        <option value="completed">🏆 Completed</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;">💾 Save Game</button>
        </form>
    </div>
</div>

<!-- Delete Modal -->
<div id="deleteModal" class="modal">
    <div class="modal-content" style="max-width: 400px;">
        <h3>🗑️ Confirm Delete</h3>
        <p>Are you sure you want to delete this game?</p>
        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
            <button id="confirmDeleteBtn" style="background: #ef4444; border: none; padding: 10px 24px; border-radius: 40px; color: white; cursor: pointer;">Delete</button>
            <button id="cancelDeleteBtn" style="background: var(--border); border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer;">Cancel</button>
        </div>
    </div>
</div>

<script>
    // Environment Variables
    window.SUPABASE_URL = 'https://inwjlxiqxtztjtrttqke.supabase.co';
