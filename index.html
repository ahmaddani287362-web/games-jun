<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#8b5cf6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>GameVault | Premium Game Tracker</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    
    <!-- Google Fonts - Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    
    <style>
        /* ============================================
           CSS VARIABLES - Premium Dark Theme
           ============================================ */
        :root {
            /* Light Mode (Default) */
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.9);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border: rgba(226, 232, 240, 0.5);
            --border-subtle: #e2e8f0;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --accent-glow: rgba(139, 92, 246, 0.3);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --sidebar-bg: rgba(30, 27, 46, 0.95);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.05);
            --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.08);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1);
            --shadow-xl: 0 25px 50px -12px rgba(0,0,0,0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Dark Mode - Premium Deep Charcoal */
        .dark-mode {
            --bg-primary: #121212;
            --bg-secondary: #1E1E1E;
            --card-bg: rgba(30, 30, 30, 0.9);
            --glass-bg: rgba(30, 30, 30, 0.8);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border: rgba(51, 51, 51, 0.5);
            --border-subtle: #333333;
            --accent: #8b5cf6;
            --accent-hover: #a855f7;
            --sidebar-bg: rgba(18, 18, 18, 0.95);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', 'Plus Jakarta Sans', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
            overflow-x: hidden;
        }

        /* Custom Premium Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
            transition: var(--transition);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-hover);
        }

        /* No Horizontal Scroll */
        body, .app-container, .main-content {
            overflow-x: hidden;
            max-width: 100vw;
        }

        /* ============================================
           LAYOUT - Fixed Sidebar + Main Content
           ============================================ */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Desktop Sidebar - Glassmorphism */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(12px);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            border-right: 1px solid var(--glass-border);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 10;
            transition: var(--transition);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), #ec4899);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-icon i {
            font-size: 1.5rem;
            color: white;
        }
        .logo-text {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 14px;
            color: var(--text-secondary);
            transition: var(--transition);
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
        }
        .nav-link i { width: 24px; font-size: 1.2rem; }
        .nav-link:hover {
            background: rgba(139, 92, 246, 0.15);
            color: var(--accent);
            transform: translateX(5px);
        }
        .nav-link.active {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.1));
            color: var(--accent);
            border-left: 3px solid var(--accent);
        }

        /* Dark Mode Toggle */
        .dark-mode-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            padding: 0.75rem;
            background: rgba(255,255,255,0.05);
            border-radius: 40px;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #3a3a4a;
            border-radius: 34px;
            transition: 0.3s;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        input:checked + .slider { background: linear-gradient(135deg, var(--accent), var(--accent-hover)); }
        input:checked + .slider:before { transform: translateX(26px); }

        /* Main Content - Margin Left for Sidebar */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            padding-bottom: 80px;
            min-height: 100vh;
        }

        /* Bottom Navigation (Mobile Only) */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            padding: 10px 20px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            z-index: 100;
            justify-content: space-around;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            transition: var(--transition);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
            min-height: 44px;
        }
        .nav-item i { font-size: 1.4rem; }
        .nav-item.active { color: var(--accent); background: rgba(139, 92, 246, 0.15); }
        .nav-item.fab {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            margin-top: -20px;
            box-shadow: 0 8px 20px var(--accent-glow);
        }

        /* Header */
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .content-header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            min-height: 44px;
        }
        .btn-primary:active { transform: scale(0.97); }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 1rem;
            border: 1px solid var(--glass-border);
            transition: var(--transition);
        }
        .stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        .stat-card i { font-size: 2rem; background: linear-gradient(135deg, var(--accent), #ec4899); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .stat-card h3 { font-size: 0.75rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { font-size: 1.8rem; font-weight: 700; }

        /* Charts */
        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .chart-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid var(--glass-border);
        }
        .chart-card h4 { text-align: center; margin-top: 1rem; color: var(--text-muted); font-weight: 500; }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 2rem;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 1rem;
            border-radius: 60px;
            border: 1px solid var(--glass-border);
        }
        .search-box {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-primary);
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid var(--border);
        }
        .search-box input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            min-height: 40px;
        }
        select {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            padding: 8px 20px;
            border-radius: 40px;
            color: var(--text-primary);
            cursor: pointer;
            min-height: 44px;
        }

        /* ============================================
           GAME CARD - PREMIUM DESIGN
           ============================================ */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
        }
        @media (min-width: 768px) {
            .games-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.8rem; }
        }
        @media (min-width: 1024px) {
            .games-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 2rem; }
        }

        /* Game Card Premium */
        .game-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid var(--glass-border);
            cursor: pointer;
        }
        .game-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: var(--shadow-xl);
            border-color: var(--accent);
        }

        /* Cover Image - Aspect Ratio 2:3 (Poster) */
        .game-cover {
            position: relative;
            aspect-ratio: 2 / 3;
            overflow: hidden;
        }
        .game-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .game-card:hover .game-cover img {
            transform: scale(1.05);
        }

        /* Gradient Overlay untuk Judul */
        .cover-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
            pointer-events: none;
        }

        /* Progress Bar Tipis Elegan */
        .progress-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255,255,255,0.2);
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-hover));
            transition: width 0.5s ease;
        }

        /* Card Content */
        .card-content {
            padding: 0.9rem;
        }
        .game-title {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }
        .game-title small {
            font-size: 0.65rem;
            font-weight: 400;
            color: var(--text-muted);
        }

        /* Status Badge - Pill-shaped Premium */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .status-badge.playing {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
        }
        .status-badge.backlog {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }
        .status-badge.completed {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }

        .rating-stars {
            display: flex;
            align-items: center;
            gap: 2px;
            margin: 8px 0;
        }
        .rating-stars i { font-size: 0.7rem; color: #fbbf24; }
        .rating-stars span { font-size: 0.65rem; color: var(--text-muted); margin-left: 6px; }

        .game-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0;
        }
        .tag {
            background: var(--bg-primary);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
            color: var(--accent);
        }

        /* Touch-friendly buttons */
        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }
        .card-actions button {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            min-width: 55px;
            min-height: 38px;
            transition: var(--transition);
        }
        .card-actions button:hover {
            background: rgba(139, 92, 246, 0.15);
            color: var(--accent);
        }

        /* Skeleton Loading - Shimmer Effect */
        .skeleton {
            background: linear-gradient(90deg, var(--border-subtle) 25%, var(--bg-primary) 50%, var(--border-subtle) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .skeleton-cover { aspect-ratio: 2 / 3; width: 100%; border-radius: 20px 20px 0 0; }
        .skeleton-title { height: 14px; width: 70%; border-radius: 8px; margin: 8px 0; }
        .skeleton-text { height: 10px; width: 90%; border-radius: 6px; margin: 6px 0; }

        /* Empty State Premium */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            border: 1px solid var(--glass-border);
        }
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
            color: var(--accent);
        }

        /* Search Results Glassmorphism */
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 320px;
            overflow-y: auto;
            margin-top: 8px;
            border-radius: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            z-index: 1000;
            display: none;
        }
        .search-result-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--glass-border);
            transition: var(--transition);
        }
        .search-result-item:hover {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
        }
        .search-result-item img {
            width: 48px;
            height: 48px;
            object-fit: cover;
            border-radius: 12px;
        }

        /* Modals - Glassmorphism */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            max-width: 550px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--glass-border);
        }
        @media (max-width: 768px) {
            .modal-content {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                border-radius: 28px 28px 0 0;
                width: 100%;
                animation: slideUp 0.3s ease;
            }
            @keyframes slideUp {
                from { transform: translateY(100%); }
                to { transform: translateY(0); }
            }
        }

        .form-group { margin-bottom: 1rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        label { font-weight: 500; display: block; margin-bottom: 6px; font-size: 0.85rem; }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 48px;
        }
        input:focus, select:focus { outline: none; border-color: var(--accent); }

        .cover-preview {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 1rem;
            border: 2px solid var(--accent);
        }

        .section { display: none; }
        .section.active { display: block; }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 1rem; padding-bottom: 80px; }
            .bottom-nav { display: flex; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 0.75rem; }
            .stat-card { padding: 1rem; }
            .stat-card p { font-size: 1.3rem; }
            .filter-bar { flex-direction: column; border-radius: 20px; }
            .games-grid { gap: 1rem; }
            .game-title { font-size: 0.75rem; }
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Desktop Sidebar -->
    <aside class="sidebar">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-dice-d6"></i></div>
            <span class="logo-text">GameVault</span>
        </div>
        <nav class="nav-menu">
            <a class="nav-link active" data-tab="dashboard"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
            <a class="nav-link" data-tab="library"><i class="fas fa-gamepad"></i><span>My Library</span></a>
        </nav>
        <div class="dark-mode-toggle">
            <i class="fas fa-moon"></i>
            <label class="switch"><input type="checkbox" id="darkModeToggle"><span class="slider round"></span></label>
            <i class="fas fa-sun"></i>
        </div>
    </aside>

    <!-- Mobile Bottom Navigation -->
    <div class="bottom-nav">
        <button class="nav-item active" data-tab="dashboard"><i class="fas fa-chart-pie"></i><span>Stats</span></button>
        <button class="nav-item fab" id="mobileAddBtn"><i class="fas fa-plus"></i><span>Add</span></button>
        <button class="nav-item" data-tab="library"><i class="fas fa-gamepad"></i><span>Library</span></button>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <header class="content-header">
            <h1 id="pageTitle">Dashboard</h1>
            <button id="addGameBtn" class="btn-primary"><i class="fas fa-plus"></i> Add Game</button>
        </header>

        <!-- Dashboard Section -->
        <section id="dashboardSection" class="section active">
            <div class="stats-grid">
                <div class="stat-card"><i class="fas fa-gamepad"></i><div><h3>Total Games</h3><p id="totalGames">0</p></div></div>
                <div class="stat-card"><i class="fas fa-trophy"></i><div><h3>Completed</h3><p id="completedGames">0</p></div></div>
                <div class="stat-card"><i class="fas fa-clock"></i><div><h3>Total Hours</h3><p id="totalHours">0</p></div></div>
                <div class="stat-card"><i class="fas fa-star"></i><div><h3>Avg Rating</h3><p id="avgRating">0.0</p></div></div>
            </div>
            <div class="charts-row">
                <div class="chart-card"><canvas id="genreChart"></canvas><h4>Top Genres</h4></div>
                <div class="chart-card"><canvas id="completionChart"></canvas><h4>Completion Status</h4></div>
                <div class="chart-card"><canvas id="ratingChart"></canvas><h4>Rating Distribution</h4></div>
            </div>
        </section>

        <!-- Library Section -->
        <section id="librarySection" class="section">
            <div class="filter-bar">
                <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search games..."></div>
                <select id="filterGenre"><option value="">All Genres</option></select>
                <select id="filterPlatform"><option value="">All Platforms</option></select>
                <select id="filterRating"><option value="">Rating</option><option value="5">5★</option><option value="4">4★+</option></select>
                <select id="filterStatus"><option value="">Status</option><option value="completed">Completed</option><option value="playing">Playing</option><option value="backlog">Backlog</option></select>
            </div>
            <div id="gamesGrid" class="games-grid"></div>
        </section>
    </main>
</div>

<!-- Add/Edit Modal -->
<div id="gameModal" class="modal">
    <div class="modal-content">
        <div class="modal-header" style="display:flex; justify-content:space-between; padding:1.5rem 1.5rem 0">
            <h3 id="modalTitle">Add New Game</h3>
            <span class="close-modal" style="cursor:pointer; font-size:2rem">&times;</span>
        </div>
        <div style="padding:1.5rem">
            <div style="position:relative; margin-bottom:1rem">
                <input type="text" id="gameSearchInput" placeholder="🔍 Search game from RAWG..." style="width:100%; padding:14px; border-radius:50px; border:1px solid var(--border); background:var(--bg-primary)">
                <div id="searchResults" class="search-results"></div>
            </div>
            <div style="text-align:center; margin:10px 0">— OR —</div>
            <form id="gameForm">
                <input type="hidden" id="gameId">
                <div class="form-group"><label>Title *</label><input type="text" id="title" required></div>
                <div id="coverPreviewContainer" style="display:none"><img id="coverPreview" class="cover-preview"></div>
                <div class="form-row">
                    <div class="form-group"><label>Platform</label><input type="text" id="platform"></div>
                    <div class="form-group"><label>Genre</label><input type="text" id="genre"></div>
                </div>
                <div class="form-group"><label>Tags (comma)</label><input type="text" id="tags"></div>
                <div class="form-row">
                    <div class="form-group"><label>Progress (%)</label><input type="number" id="progress" min="0" max="100" value="0"></div>
                    <div class="form-group"><label>Rating (1-5)</label><input type="number" id="rating" step="0.5" min="1" max="5" value="3"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Hours</label><input type="number" id="hours_played" step="0.5" value="0"></div>
                    <div class="form-group"><label>Status</label><select id="status"><option value="backlog">📚 Backlog</option><option value="playing">🎮 Playing</option><option value="completed">🏆 Completed</option></select></div>
                </div>
                <button type="submit" class="btn-primary" style="width:100%">💾 Save Game</button>
            </form>
        </div>
    </div>
</div>

<!-- Delete Modal -->
<div id="deleteModal" class="modal">
    <div class="modal-content" style="max-width:400px">
        <h3>🗑️ Delete Game</h3>
        <p>Are you sure?</p>
        <div style="display:flex; gap:1rem; margin-top:1.5rem">
            <button id="confirmDeleteBtn" style="background:#ef4444; border:none; padding:12px 24px; border-radius:40px; color:white; cursor:pointer">Delete</button>
            <button id="cancelDeleteBtn" style="background:var(--border); border:none; padding:12px 24px; border-radius:40px; cursor:pointer">Cancel</button>
        </div>
    </div>
</div>

<!-- Game Detail Modal -->
<div id="detailModal" class="modal">
    <div class="modal-content" style="max-width:700px; padding:0; overflow:hidden">
        <div style="position:relative">
            <div id="detailHero" class="detail-hero" style="height:240px; background-size:cover; background-position:center"></div>
            <span class="close-modal" style="position:absolute; top:20px; right:20px; cursor:pointer; background:rgba(0,0,0,0.5); width:40px; height:40px; display:flex; align-items:center; justify-content:center; border-radius:50%; color:white; font-size:1.5rem">&times;</span>
        </div>
        <div id="detailContent" class="detail-content" style="padding:1.5rem"></div>
    </div>
</div>
