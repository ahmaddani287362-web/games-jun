<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GameVault | Premium Game Tracker</title>
    <!-- Favicon - Fix 404 error -->
<link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAADKSURBVDhPjZLRDcIwDET/mbATbMIMTMAIjMAIjIAzUJ8rJ1XaSlWCi/pkOXfn2E4pfIwxXoBSytiMGCNKKYnjOIZpmuYkSYLrutjtdjiOI/Z9j67rMM8zpmnCtigKVEqhlALGGGxCiEhjjLAsC27rVFXFMY4jttsthmFAMY4j7vuObdsiyzI454CZsW3bIqUUcs6BMYYkSZBzDk3T4H3fBzPjPM/AGIOUEpIkgXMOmBl931/AGIPnedi2Dc45SCmBmY+JEAdBEHzj/98va5u0T2YwTYMAAAAASUVORK5CYII=">
    <!-- Font Awesome 6 (Free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <div class="app-container">
        <!-- Sidebar / Nav Premium -->
        <aside class="sidebar">
            <div class="logo-area">
                <i class="fas fa-dice-d6"></i>
                <span>GameVault</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-link active" data-tab="dashboard"><i class="fas fa-chart-pie"></i> Dashboard</a>
                <a href="#" class="nav-link" data-tab="library"><i class="fas fa-gamepad"></i> My Library</a>
            </nav>
            <div class="dark-mode-toggle">
                <i class="fas fa-moon"></i>
                <label class="switch">
                    <input type="checkbox" id="darkModeToggle">
                    <span class="slider round"></span>
                </label>
                <i class="fas fa-sun"></i>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="content-header">
                <h1 id="pageTitle">Dashboard</h1>
                <button id="addGameBtn" class="btn-primary"><i class="fas fa-plus"></i> Add Game</button>
            </header>

            <!-- DASHBOARD SECTION -->
            <section id="dashboardSection" class="section active">
                <div class="stats-grid">
                    <div class="stat-card"><i class="fas fa-gamepad"></i><div><h3>Total Games</h3><p id="totalGames">0</p></div></div>
                    <div class="stat-card"><i class="fas fa-trophy"></i><div><h3>Completed</h3><p id="completedGames">0</p></div></div>
                    <div class="stat-card"><i class="fas fa-clock"></i><div><h3>Total Hours</h3><p id="totalHours">0</p></div></div>
                    <div class="stat-card"><i class="fas fa-star"></i><div><h3>Avg Rating</h3><p id="avgRating">0.0</p></div></div>
                </div>

                <div class="charts-row">
                    <div class="chart-card"><canvas id="genreChart"></canvas><h4>Top Genres</h4></div>
                    <div class="chart-card"><canvas id="completionChart"></canvas><h4>Completion Status</h4></div>
                    <div class="chart-card"><canvas id="ratingChart"></canvas><h4>Rating Distribution</h4></div>
                </div>
            </section>

            <!-- LIBRARY SECTION -->
            <section id="librarySection" class="section">
                <div class="filter-bar">
                    <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search title..."></div>
                    <select id="filterGenre"><option value="">All Genres</option></select>
                    <select id="filterPlatform"><option value="">All Platforms</option></select>
                    <select id="filterRating"><option value="">Rating</option><option value="5">5★</option><option value="4">4+★</option><option value="3">3+★</option></select>
                    <select id="filterStatus"><option value="">Status</option><option value="completed">Completed</option><option value="playing">Playing</option><option value="backlog">Backlog</option></select>
                </div>
                <div id="gamesGrid" class="games-grid"></div>
            </section>
        </main>
    </div>

    <!-- MODAL ADD/EDIT GAME -->
    <div id="gameModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3 id="modalTitle">Add New Game</h3><span class="close-modal">&times;</span></div>
            <form id="gameForm">
                <input type="hidden" id="gameId">
                <div class="form-group"><label>Title</label><input type="text" id="title" required></div>
                <div class="form-row"><div class="form-group"><label>Platform</label><input type="text" id="platform" placeholder="e.g., PC, PS5"></div>
                <div class="form-group"><label>Genre</label><input type="text" id="genre" placeholder="Action, RPG"></div></div>
                <div class="form-group"><label>Tags (comma)</label><input type="text" id="tags" placeholder="story-rich, indie"></div>
                <div class="form-row"><div class="form-group"><label>Progress (%)</label><input type="number" id="progress" min="0" max="100" value="0"></div>
                <div class="form-group"><label>Rating (1-5)</label><input type="number" id="rating" step="0.5" min="1" max="5" value="3"></div></div>
                <div class="form-group"><label>Hours Played</label><input type="number" id="hours_played" step="0.5" value="0"></div>
                <div class="form-group"><label>Status</label><select id="status"><option value="backlog">Backlog</option><option value="playing">Playing</option><option value="completed">Completed</option></select></div>
                <button type="submit" class="btn-primary full">Save Game</button>
            </form>
        </div>
    </div>

    <!-- DELETE CONFIRMATION MODAL -->
    <div id="deleteModal" class="modal">
        <div class="modal-content small">
            <h3>Confirm Delete</h3><p>Are you sure you want to delete this game?</p>
            <div class="modal-buttons"><button id="confirmDeleteBtn" class="btn-danger">Delete</button><button id="cancelDeleteBtn" class="btn-secondary">Cancel</button></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
