<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#3b82f6">
    <title>GameVault | Game Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #121212;
            --surface: #1e1e1e;
            --surface-hover: #252525;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #6b6b6b;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --accent-glow: rgba(59, 130, 246, 0.3);
            --glass-bg: rgba(18, 18, 18, 0.85);
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        
        /* Layout */
        .app-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 280px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            border-right: 1px solid var(--border);
            position: fixed;
            top: 0; left: 0; bottom: 0;
            z-index: 20;
        }
        .logo-icon {
            width: 44px; height: 44px;
            background: var(--accent-gradient);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .logo-icon i { font-size: 1.6rem; color: white; }
        .logo-text { font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, #fff, var(--accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .nav-menu { display: flex; flex-direction: column; gap: 0.5rem; flex: 1; }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 14px;
            color: var(--text-secondary);
            transition: var(--transition);
            font-weight: 500;
            cursor: pointer;
        }
        .nav-link:hover { color: white; background: rgba(59, 130, 246, 0.1); transform: translateX(5px); }
        .nav-link.active { background: rgba(59, 130, 246, 0.15); color: var(--accent); border-left: 3px solid var(--accent); }
        
        /* Dark Mode Toggle */
        .dark-mode-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            background: rgba(255,255,255,0.03);
            border-radius: 40px;
        }
        .switch { position: relative; display: inline-block; width: 52px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #2a2a2a; border-radius: 34px; transition: 0.3s;
        }
        .slider:before {
            position: absolute; content: ""; height: 20px; width: 20px;
            left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: 0.3s;
        }
        input:checked + .slider { background: var(--accent-gradient); }
        input:checked + .slider:before { transform: translateX(26px); }
        
        /* Main Content */
        .main-content { flex: 1; margin-left: 280px; min-height: 100vh; }
        .sticky-header {
            position: sticky; top: 0; z-index: 15;
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            flex-wrap: wrap;
            gap: 1rem;
            max-width: 1600px;
            margin: 0 auto;
        }
        .content-header h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .btn-primary {
            background: var(--accent-gradient);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--accent-glow); }
        
        /* CONTAINER FULL WIDTH */
        .container {
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 1rem;
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .stat-card:hover { transform: translateY(-4px); background: var(--surface-hover); border-color: var(--accent); }
        .stat-card i { font-size: 2rem; background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .stat-card h3 { font-size: 0.7rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { font-size: 1.8rem; font-weight: 800; }
        
        /* Charts */
        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .chart-card {
            background: var(--surface);
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid var(--border);
        }
        .chart-card h4 { text-align: center; margin-top: 1rem; color: var(--text-muted); font-size: 0.85rem; }
        
        /* FILTER BAR - FULL WIDTH */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 2rem;
            background: var(--surface);
            padding: 1rem 1.5rem;
            border-radius: 60px;
            border: 1px solid var(--border);
            width: 100%;
        }
        .search-box {
            flex: 2;
            min-width: 200px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-secondary);
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid var(--border);
        }
        .search-box input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
        }
        select {
            flex: 1;
            min-width: 120px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 8px 20px;
            border-radius: 40px;
            color: var(--text-primary);
            cursor: pointer;
        }
        
        /* GAMES GRID - LEBAR PENUH */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.8rem;
            width: 100%;
        }
        
        /* Game Card */
        .game-card {
            background: var(--surface);
            border-radius: 20px;
            overflow: hidden;
            transition: var(--transition);
            border: 1px solid var(--border);
            cursor: pointer;
        }
        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-xl);
            border-color: var(--accent);
        }
        .game-cover {
            position: relative;
            aspect-ratio: 3 / 4;
            overflow: hidden;
        }
        .game-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .game-card:hover .game-cover img { transform: scale(1.08); }
        .cover-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.5), transparent);
        }
        .progress-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255,255,255,0.1);
        }
        .progress-fill {
            height: 100%;
            background: var(--accent-gradient);
            transition: width 0.5s ease;
        }
        .card-content { padding: 1rem; }
        .game-title {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .game-title small { font-size: 0.65rem; font-weight: 400; color: var(--text-muted); }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.6rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .status-badge.playing { background: rgba(59,130,246,0.15); color: #3b82f6; }
        .status-badge.backlog { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .status-badge.completed { background: rgba(16,185,129,0.15); color: #10b981; }
        
        .rating-stars { display: flex; align-items: center; gap: 3px; margin: 8px 0; }
        .rating-stars i { font-size: 0.7rem; color: #fbbf24; }
        .rating-stars span { font-size: 0.65rem; color: var(--text-muted); margin-left: 6px; }
        
        .game-meta { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
        .tag { background: var(--bg-secondary); padding: 3px 8px; border-radius: 20px; font-size: 0.6rem; color: var(--accent); }
        
        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }
        .card-actions button {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            transition: var(--transition);
        }
        .card-actions button:hover { background: rgba(59,130,246,0.15); color: var(--accent); }
        
        /* Bottom Navigation Mobile */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 12px 20px;
            z-index: 100;
            justify-content: space-around;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
        }
        .nav-item i { font-size: 1.4rem; }
        .nav-item.active { color: var(--accent); background: rgba(59,130,246,0.15); }
        .nav-item.fab {
            background: var(--accent-gradient);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            margin-top: -20px;
            box-shadow: 0 8px 20px var(--accent-glow);
        }
        
        /* Skeleton & Empty State */
        .skeleton {
            background: linear-gradient(90deg, var(--surface) 25%, var(--surface-hover) 50%, var(--surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .skeleton-cover { aspect-ratio: 3 / 4; width: 100%; border-radius: 20px 20px 0 0; }
        .skeleton-title { height: 14px; width: 70%; border-radius: 8px; margin: 8px 0; }
        .skeleton-text { height: 10px; width: 90%; border-radius: 6px; margin: 6px 0; }
        
        .empty-state {
            text-align: center;
            padding: 4rem;
            background: var(--surface);
            border-radius: 24px;
            grid-column: 1/-1;
        }
        .empty-state i { font-size: 4rem; margin-bottom: 1rem; opacity: 0.5; }
        
        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            max-width: 550px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }
        .form-group { margin-bottom: 1rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        label { font-size: 0.8rem; margin-bottom: 6px; display: block; }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        .cover-preview { width: 100%; height: 160px; object-fit: cover; border-radius: 20px; margin-bottom: 1rem; border: 2px solid var(--accent); }
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 320px;
            overflow-y: auto;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            z-index: 1000;
            display: none;
        }
        .search-result-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
        }
        .search-result-item:hover { background: var(--accent-gradient); color: white; }
        .search-result-item img { width: 48px; height: 48px; object-fit: cover; border-radius: 12px; }
        .detail-hero { height: 240px; background-size: cover; background-position: center; position: relative; }
        .detail-hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to top, var(--surface), transparent);
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .section { display: none; }
        .section.active { display: block; }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .games-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }
        }
        @media (max-width: 900px) {
            .games-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; }
            .bottom-nav { display: flex; }
            .content-header { padding: 1rem; }
            .content-header h1 { font-size: 1.4rem; }
            .container { padding: 1rem; padding-bottom: 80px; }
            .stats-grid { gap: 0.75rem; }
            .stat-card { padding: 1rem; }
            .stat-card p { font-size: 1.3rem; }
            .filter-bar { flex-direction: column; border-radius: 24px; }
            .search-box, select { width: 100%; flex: auto; }
            .games-grid { gap: 0.8rem; }
            .game-title { font-size: 0.75rem; }
            .form-row { grid-template-columns: 1fr; }
            .modal-content {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                border-radius: 28px 28px 0 0;
                width: 100%;
                animation: slideUp 0.3s ease;
            }
            @keyframes slideUp {
                from { transform: translateY(100%); }
                to { transform: translateY(0); }
            }
        }
        @media (max-width: 480px) {
            .games-grid { gap: 0.7rem; }
            .card-content { padding: 0.7rem; }
            .rating-stars i { font-size: 0.6rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <div class="logo-area"><div class="logo-icon"><i class="fas fa-dice-d6"></i></div><span class="logo-text">GameVault</span></div>
        <nav class="nav-menu">
            <a class="nav-link active" data-tab="dashboard"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
            <a class="nav-link" data-tab="library"><i class="fas fa-gamepad"></i><span>My Library</span></a>
        </nav>
        <div class="dark-mode-toggle">
            <i class="fas fa-moon"></i>
            <label class="switch"><input type="checkbox" id="darkModeToggle"><span class="slider round"></span></label>
            <i class="fas fa-sun"></i>
        </div>
    </aside>

    <div class="bottom-nav">
        <button class="nav-item active" data-tab="dashboard"><i class="fas fa-chart-pie"></i><span>Stats</span></button>
        <button class="nav-item fab" id="mobileAddBtn"><i class="fas fa-plus"></i><span>Add</span></button>
        <button class="nav-item" data-tab="library"><i class="fas fa-gamepad"></i><span>Library</span></button>
    </div>

    <main class="main-content">
        <div class="sticky-header">
            <div class="content-header">
                <h1 id="pageTitle">Dashboard</h1>
                <button id="addGameBtn" class="btn-primary"><i class="fas fa-plus"></i> Add Game</button>
            </div>
        </div>
        <div class="container">
            <section id="dashboardSection" class="section active">
                <div class="stats-grid">
                    <div class="stat-card"><i class="fas fa-gamepad"></i><div><h3>Total Games</h3><p id="totalGames">0</p></div></div>
                    <div class="stat-card"><i class="fas fa-trophy"></i><div><h3>Completed</h3><p id="completedGames">0</p></div></div>
                    <div class="stat-card"><i class="fas fa-clock"></i><div><h3>Total Hours</h3><p id="totalHours">0</p></div></div>
                    <div class="stat-card"><i class="fas fa-star"></i><div><h3>Avg Rating</h3><p id="avgRating">0.0</p></div></div>
                </div>
                <div class="charts-row">
                    <div class="chart-card"><canvas id="genreChart"></canvas><h4>Top Genres</h4></div>
                    <div class="chart-card"><canvas id="completionChart"></canvas><h4>Completion Status</h4></div>
                    <div class="chart-card"><canvas id="ratingChart"></canvas><h4>Rating Distribution</h4></div>
                </div>
            </section>
            <section id="librarySection" class="section">
                <div class="filter-bar">
                    <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search games..."></div>
                    <select id="filterGenre"><option value="">All Genres</option></select>
                    <select id="filterPlatform"><option value="">All Platforms</option></select>
                    <select id="filterRating"><option value="">All Ratings</option><option value="5">5★</option><option value="4">4★+</option></select>
                    <select id="filterStatus"><option value="">All Status</option><option value="completed">Completed</option><option value="playing">Playing</option><option value="backlog">Backlog</option></select>
                </div>
                <div id="gamesGrid" class="games-grid"></div>
            </section>
        </div>
    </main>
</div>

<div id="gameModal" class="modal"><div class="modal-content"><div style="display:flex; justify-content:space-between; padding:1.5rem 1.5rem 0"><h3 id="modalTitle">Add New Game</h3><span class="close-modal" style="cursor:pointer; font-size:2rem">&times;</span></div><div style="padding:1.5rem"><div style="position:relative"><input type="text" id="gameSearchInput" placeholder="🔍 Search game from RAWG..." style="width:100%; padding:14px; border-radius:50px; border:1px solid var(--border); background:var(--bg-secondary); color:var(--text-primary)"><div id="searchResults" class="search-results"></div></div><div style="text-align:center; margin:10px 0">— OR —</div><form id="gameForm"><input type="hidden" id="gameId"><div class="form-group"><label>Game Title *</label><input type="text" id="title" required></div><div id="coverPreviewContainer" style="display:none"><img id="coverPreview" class="cover-preview"></div><div class="form-row"><div class="form-group"><label>Platform</label><input type="text" id="platform"></div><div class="form-group"><label>Genre</label><input type="text" id="genre"></div></div><div class="form-group"><label>Tags (comma)</label><input type="text" id="tags"></div><div class="form-row"><div class="form-group"><label>Progress (%)</label><input type="number" id="progress" min="0" max="100" value="0"></div><div class="form-group"><label>Rating (1-5)</label><input type="number" id="rating" step="0.5" min="1" max="5" value="3"></div></div><div class="form-row"><div class="form-group"><label>Hours</label><input type="number" id="hours_played" step="0.5" value="0"></div><div class="form-group"><label>Status</label><select id="status"><option value="backlog">📚 Backlog</option><option value="playing">🎮 Playing</option><option value="completed">🏆 Completed</option></select></div></div><button type="submit" class="btn-primary" style="width:100%">💾 Save Game</button></form></div></div></div>
