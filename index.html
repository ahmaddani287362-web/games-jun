<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#8b5cf6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GameVault | Premium Game Tracker</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://placehold.co/192x192/8b5cf6/white?text=🎮">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border: rgba(226, 232, 240, 0.5);
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --accent-glow: rgba(139, 92, 246, 0.3);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --sidebar-bg: rgba(30, 27, 46, 0.95);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1);
            --shadow-xl: 0 25px 50px -12px rgba(0,0,0,0.25);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark-mode {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --card-bg: rgba(30, 41, 59, 0.9);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: rgba(51, 65, 85, 0.5);
            --glass-bg: rgba(15, 23, 42, 0.8);
            --sidebar-bg: rgba(15, 15, 26, 0.95);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
            overflow-x: hidden;
            padding-bottom: 0;
        }

        /* No Horizontal Scroll */
        body, .app-container, .main-content {
            overflow-x: hidden;
            max-width: 100vw;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* Glassmorphism Nav (Desktop) */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(12px);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            border-right: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            height: 100vh;
            transition: var(--transition);
        }

        /* Bottom Navigation (Mobile Only) */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            padding: 10px 20px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            z-index: 100;
            justify-content: space-around;
            align-items: center;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            transition: var(--transition);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
        }

        .nav-item i {
            font-size: 1.4rem;
        }

        .nav-item.active {
            color: var(--accent);
            background: rgba(139, 92, 246, 0.15);
        }

        .nav-item.fab {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            margin-top: -20px;
            box-shadow: var(--shadow-lg);
        }

        .nav-item.fab i {
            font-size: 1.6rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            font-family: 'Outfit', sans-serif;
        }

        .logo-area i {
            font-size: 2rem;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-menu { display: flex; flex-direction: column; gap: 0.75rem; }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            border-radius: 14px;
            color: #cbd5e1;
            transition: var(--transition);
            font-weight: 500;
            text-decoration: none;
        }

        .nav-link i { width: 24px; }
        .nav-link:hover { background: rgba(139, 92, 246, 0.2); color: white; transform: translateX(5px); }
        .nav-link.active {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.2));
            color: white;
            border-left: 3px solid var(--accent);
        }

        .dark-mode-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            color: white;
            padding: 1rem;
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            border-radius: 34px;
            transition: 0.3s;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        input:checked + .slider { background: linear-gradient(135deg, var(--accent), var(--accent-hover)); }
        input:checked + .slider:before { transform: translateX(26px); }

        .main-content {
            flex: 1;
            padding: 2rem;
            padding-bottom: 80px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .content-header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            min-height: 44px;
        }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px var(--accent-glow); }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 28px;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--glass-border);
            transition: var(--transition);
        }
        .stat-card:active { transform: scale(0.98); }
        .stat-card i { font-size: 2rem; background: linear-gradient(135deg, var(--accent), #ec4899); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .stat-card h3 { font-size: 0.75rem; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { font-size: 1.8rem; font-weight: 700; }

        /* Charts Responsive */
        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .chart-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 1.5rem;
            border: 1px solid var(--glass-border);
            transition: var(--transition);
            overflow-x: auto;
        }
        
        .chart-card canvas {
            max-height: 250px;
            width: 100%;
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 2rem;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 1rem 1.5rem;
            border-radius: 60px;
            border: 1px solid var(--glass-border);
        }
        
        .search-box {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-primary);
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid var(--border);
        }
        .search-box input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 0.9rem;
            min-height: 40px;
        }
        
        select {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 40px;
            color: var(--text-primary);
            cursor: pointer;
            min-height: 44px;
        }

        /* Games Grid - Mobile 2 Columns */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
        }

        @media (min-width: 640px) {
            .games-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; }
        }

        @media (min-width: 1024px) {
            .games-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.8rem; }
        }

        /* Game Card - Portrait 2:3 */
        .game-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            transition: var(--transition);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            position: relative;
            animation: cardFadeIn 0.4s ease backwards;
        }
        
        .game-card:active { transform: scale(0.98); }
        
        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .game-cover {
            position: relative;
            aspect-ratio: 2 / 3;
            overflow: hidden;
            background: linear-gradient(135deg, #1e1b2e, #2d2a4a);
        }
        
        .game-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        
        .game-card:hover .game-cover img { transform: scale(1.05); }
        
        /* Gradient Overlay */
        .cover-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
            pointer-events: none;
        }
        
        .progress-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: rgba(255,255,255,0.2);
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #a855f7, #ec4899);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card-content {
            padding: 0.75rem;
        }
        
        .game-title {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .game-title small { font-size: 0.6rem; color: var(--text-secondary); font-weight: 400; }
        
        .rating-stars {
            display: flex;
            align-items: center;
            gap: 3px;
            margin: 6px 0;
        }
        .rating-stars i { font-size: 0.7rem; }
        .rating-stars i.fas.fa-star { color: #fbbf24; }
        
        .game-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin: 6px 0;
        }
        .tag {
            background: var(--bg-primary);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 500;
            color: var(--accent);
        }
        
        /* Touch-friendly buttons (min 44px) */
        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }
        .card-actions button {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            transition: var(--transition);
            padding: 10px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            min-width: 60px;
            min-height: 44px;
        }
        .card-actions button:active { background: rgba(139, 92, 246, 0.2); transform: scale(0.95); }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, var(--border) 25%, var(--bg-primary) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .skeleton-cover {
            aspect-ratio: 2 / 3;
            width: 100%;
            border-radius: 20px 20px 0 0;
        }
        
        .skeleton-title {
            height: 14px;
            width: 70%;
            border-radius: 8px;
            margin: 8px 0;
        }
        
        .skeleton-text {
            height: 10px;
            width: 90%;
            border-radius: 6px;
            margin: 6px 0;
        }

        /* Search Dropdown Glassmorphism */
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 320px;
            overflow-y: auto;
            margin-top: 8px;
            border-radius: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-xl);
            z-index: 1000;
            display: none;
        }
        
        .search-result-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 16px;
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 1px solid var(--glass-border);
            min-height: 70px;
        }
        
        .search-result-item:active { background: var(--accent); color: white; }
        .search-result-item.selected { background: linear-gradient(135deg, var(--accent), var(--accent-hover)); color: white; }
        
        .search-result-item img {
            width: 48px;
            height: 48px;
            object-fit: cover;
            border-radius: 12px;
        }
        
        .search-result-info h4 { font-size: 0.9rem; margin-bottom: 4px; }
        .search-result-info p { font-size: 0.7rem; opacity: 0.8; }

        /* Modals - Glassmorphism */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .modal-content {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            max-width: 650px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--glass-border);
            animation: modalFadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(-20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        /* Bottom Sheet untuk Mobile */
        @media (max-width: 768px) {
            .modal-content {
                width: 100%;
                max-width: 100%;
                max-height: 90vh;
                border-radius: 28px 28px 0 0;
                position: fixed;
                bottom: 0;
                left: 0;
                animation: bottomSheetIn 0.3s ease;
            }
            
            @keyframes bottomSheetIn {
                from { transform: translateY(100%); }
                to { transform: translateY(0); }
            }
        }
        
        /* Game Detail Modal - Premium */
        .detail-hero {
            position: relative;
            height: 280px;
            background-size: cover;
            background-position: center;
            border-radius: 28px 28px 0 0;
        }
        
        .detail-hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to top, var(--bg-secondary), transparent);
        }
        
        .detail-content { padding: 1.5rem; }
        .detail-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
        
        .detail-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 1rem 0;
            padding: 1rem 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        
        .detail-description {
            line-height: 1.6;
            margin: 1rem 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .detail-link {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 40px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            font-size: 0.85rem;
            transition: var(--transition);
            min-height: 44px;
        }

        /* Grouped Games */
        .group-section {
            margin-bottom: 2rem;
        }
        .group-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--accent);
        }

        /* Empty State Premium */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            border: 1px solid var(--glass-border);
        }
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Pull to Refresh */
        .pull-to-refresh {
            text-align: center;
            padding: 10px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            transition: opacity 0.3s;
        }
        .pull-to-refresh i {
            display: inline-block;
            transition: transform 0.3s;
        }

        .form-group { margin-bottom: 1rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        label { font-weight: 500; display: block; margin-bottom: 6px; font-size: 0.85rem; }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
            min-height: 48px;
        }
        input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

        .cover-preview {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 1rem;
            border: 2px solid var(--accent);
        }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Specific Styles */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .bottom-nav { display: flex; }
            .main-content { padding: 1rem; padding-bottom: 80px; }
            .content-header h1 { font-size: 1.5rem; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 0.75rem; }
            .stat-card { padding: 1rem; }
            .stat-card p { font-size: 1.3rem; }
            .stat-card i { font-size: 1.5rem; }
            .filter-bar { border-radius: 20px; padding: 0.75rem; flex-direction: column; }
            .search-box { width: 100%; }
            select { width: 100%; }
            .game-title { font-size: 0.75rem; }
            .tag { font-size: 0.55rem; padding: 2px 6px; }
            .rating-stars i { font-size: 0.6rem; }
            .card-actions button { padding: 8px 10px; min-width: 50px; font-size: 0.65rem; }
            .form-row { grid-template-columns: 1fr; }
            .detail-title { font-size: 1.2rem; }
            .detail-hero { height: 200px; }
        }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Vibration feedback simulation */
        .vibration {
            animation: vibrate 0.1s ease-in-out 0s 2;
        }
        
        @keyframes vibrate {
            0% { transform: translateX(0); }
            50% { transform: translateX(2px); }
            100% { transform: translateX(-2px); }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Desktop Sidebar -->
    <aside class="sidebar">
        <div class="logo-area"><i class="fas fa-dice-d6"></i><span>GameVault</span></div>
        <nav class="nav-menu">
            <a href="#" class="nav-link active" data-tab="dashboard"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
            <a href="#" class="nav-link" data-tab="library"><i class="fas fa-gamepad"></i><span>My Library</span></a>
        </nav>
        <div class="dark-mode-toggle">
            <i class="fas fa-moon"></i>
            <label class="switch"><input type="checkbox" id="darkModeToggle"><span class="slider round"></span></label>
            <i class="fas fa-sun"></i>
        </div>
    </aside>
    
    <!-- Mobile Bottom Navigation -->
    <div class="bottom-nav">
        <button class="nav-item" data-tab="dashboard"><i class="fas fa-chart-pie"></i><span>Stats</span></button>
        <button class="nav-item fab" id="mobileAddBtn"><i class="fas fa-plus"></i><span>Add</span></button>
        <button class="nav-item" data-tab="library"><i class="fas fa-gamepad"></i><span>Library</span></button>
    </div>
    
    <main class="main-content" id="mainContent">
        <!-- Pull to Refresh Indicator -->
        <div class="pull-to-refresh" id="pullToRefresh">
            <i class="fas fa-arrow-down"></i> <span>Pull down to refresh</span>
        </div>
        
        <header class="content-header">
            <h1 id="pageTitle">Dashboard</h1>
            <button id="addGameBtn" class="btn-primary desktop-only"><i class="fas fa-plus"></i> Add Game</button>
        </header>
        
        <section id="dashboardSection" class="section active">
            <div class="stats-grid">
                <div class="stat-card"><i class="fas fa-gamepad"></i><div><h3>Total Games</h3><p id="totalGames">0</p></div></div>
                <div class="stat-card"><i class="fas fa-trophy"></i><div><h3>Completed</h3><p id="completedGames">0</p></div></div>
                <div class="stat-card"><i class="fas fa-clock"></i><div><h3>Total Hours</h3><p id="totalHours">0</p></div></div>
                <div class="stat-card"><i class="fas fa-star"></i><div><h3>Avg Rating</h3><p id="avgRating">0.0</p></div></div>
            </div>
            <div class="charts-row">
                <div class="chart-card"><canvas id="genreChart"></canvas><h4>Top Genres</h4></div>
                <div class="chart-card"><canvas id="completionChart"></canvas><h4>Completion Status</h4></div>
                <div class="chart-card"><canvas id="ratingChart"></canvas><h4>Rating Distribution</h4></div>
            </div>
        </section>
        
        <section id="librarySection" class="section">
            <div class="filter-bar">
                <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search your library..."></div>
                <select id="filterGenre"><option value="">All Genres</option></select>
                <select id="filterPlatform"><option value="">All Platforms</option></select>
                <select id="filterRating"><option value="">All Ratings</option><option value="5">5★</option><option value="4">4★+</option><option value="3">3★+</option></select>
                <select id="filterStatus"><option value="">All Status</option><option value="completed">Completed</option><option value="playing">Playing</option><option value="backlog">Backlog</option></select>
            </div>
            <div id="gamesGrid" class="games-grid"></div>
        </section>
    </main>
</div>

<!-- ADD/EDIT MODAL -->
<div id="gameModal" class="modal">
    <div class="modal-content">
        <div class="modal-header" style="display:flex; justify-content:space-between; padding:1.5rem 1.5rem 0">
            <h3 id="modalTitle">Add New Game</h3>
            <span class="close-modal" style="cursor:pointer; font-size:2rem">&times;</span>
        </div>
        <div style="padding:1.5rem">
            <div style="position:relative; margin-bottom:1rem">
                <input type="text" id="gameSearchInput" class="game-search-input" placeholder="🔍 Search game from RAWG... (auto-fill)" style="width:100%; padding:14px; border-radius:50px; border:1px solid var(--border); background:var(--bg-primary)">
                <div id="searchResults" class="search-results"></div>
            </div>
            <div style="text-align:center; margin:10px 0">— OR —</div>
            <form id="gameForm">
                <input type="hidden" id="gameId">
                <div class="form-group"><label>Game Title *</label><input type="text" id="title" required></div>
                <div id="coverPreviewContainer" style="display:none;"><img id="coverPreview" class="cover-preview" src=""></div>
                <div class="form-row">
                    <div class="form-group"><label>Platform</label><input type="text" id="platform"></div>
                    <div class="form-group"><label>Genre</label><input type="text" id="genre"></div>
                </div>
                <div class="form-group"><label>Tags (comma)</label><input type="text" id="tags"></div>
                <div class="form-row">
                    <div class="form-group"><label>Progress (%)</label><input type="number" id="progress" min="0" max="100" value="0"></div>
                    <div class="form-group"><label>Rating (1-5)</label><input type="number" id="rating" step="0.5" min="1" max="5" value="3"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Hours Played</label><input type="number" id="hours_played" step="0.5" value="0"></div>
                    <div class="form-group"><label>Status</label><select id="status"><option value="backlog">📚 Backlog</option><option value="playing">🎮 Playing</option><option value="completed">🏆 Completed</option></select></div>
                </div>
                <button type="submit" class="btn-primary full" style="width:100%">💾 Save Game</button>
            </form>
        </div>
    </div>
</div>

<!-- DETAIL MODAL -->
<div id="detailModal" class="modal">
    <div class="modal-content" style="max-width:750px; padding:0; overflow:hidden">
        <div style="position:relative">
            <div id="detailHero" class="detail-hero"></div>
            <span class="close-modal" style="position:absolute; top:20px; right:20px; cursor:pointer; background:rgba(0,0,0,0.5); width:40px; height:40px; display:flex; align-items:center; justify-content:center; border-radius:50%; color:white; font-size:1.5rem">&times;</span>
        </div>
        <div id="detailContent" class="detail-content"></div>
    </div>
</div>

<!-- DELETE MODAL -->
<div id="deleteModal" class="modal">
    <div class="modal-content" style="max-width:400px">
        <h3>🗑️ Confirm Delete</h3>
        <p>Are you sure you want to delete this game?</p>
        <div style="display:flex; gap:1rem; margin-top:1.5rem">
            <button id="confirmDeleteBtn" class="btn-primary" style="background:#ef4444">Delete</button>
            <button id="cancelDeleteBtn" class="btn-secondary">Cancel</button>
        </div>
    </div>
</div>
